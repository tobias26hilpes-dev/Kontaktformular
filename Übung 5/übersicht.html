<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            font-size: 20px;
            background-color: #ececec;
            color: #222;
        }

        .top-bar {
            background-color: #9e9e9e;
            padding: 16px 20px;
            font-weight: bold;
            font-size: 32px;
            text-align: center;
        }

        .card {
            max-width: 760px;
            margin: 40px auto;
            background-color: #fff;
            border: 2px solid #d0d0d0;
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        }

        .nav-link {
            display: inline-block;
            margin-bottom: 24px;
            color: #222;
            text-decoration: none;
            font-weight: bold;
        }

        #storage-output {
            margin-bottom: 20px;
            line-height: 1.6;
        }

        button {
            font-size: 19px;
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid #999;
            cursor: pointer;
        }
    </style>

</head>
<body>
    <div class="top-bar">Übersicht</div>
    <div class="card">
        <a class="nav-link" href="index.html">Home</a>
        
        <div id="storage-output"></div>
        <button onclick="deletelocalStorage()">Löschen</button>
    </div>

    <script src="übersicht.js"></script>
</body>
</html>
