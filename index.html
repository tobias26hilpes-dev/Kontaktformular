<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulareingabe</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            font-size: 20px;
            background-color: #ececec;
            color: #222;
        }

        .top-bar {
            background-color: #9e9e9e;
            padding: 16px 20px;
            font-weight: bold;
            font-size: 32px;
            text-align: center;
        }

        .card {
            max-width: 760px;
            margin: 40px auto;
            background-color: #fff;
            border: 2px solid #d0d0d0;
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        }

        .nav-link {
            display: inline-block;
            margin-bottom: 24px;
            color: #222;
            text-decoration: none;
            font-weight: bold;
        }

        form > div {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"] {
            width: 100%;
            padding: 12px;
            font-size: 20px;
            border: 1px solid #bababa;
            border-radius: 8px;
        }

        input[type="submit"],
        input[type="reset"] {
            font-size: 19px;
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid #999;
            cursor: pointer;
            margin-right: 10px;
        }
    </style>
</head>

<body>
    <div class="top-bar">Kontaktformular</div>
    <div class="card">
        <a class="nav-link" href="übersicht.html">Zur Übersicht</a>
        <form id="nameForm" method="get" enctype="multipart/form-data">
            <div>
                <label for="firstname">Vorname:</label>
                <input type="text" id="firstname" name="firstname" required />
            </div>
            <div>
                <label for="lastname">Nachname:</label>
                <input type="text" id="lastname" name="lastname" required />
            </div>
            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required />
            </div>
            <div>
                <label for="phonenumber">Telefonnummer:</label>
                <input type="tel" id="phonenumber" name="phonenumber" required />
            </div>
            <div>
                <label for="date">Geburstdatum:</label>
                <input type="date" id="date" name="date" required />
            </div>
            <div>
                <input type="submit" id="submitBtn" />
                <input type="reset" />
            </div>
        </form>
    </div>

    <script src="eingabe.js"></script>
</body>
    
</html>
